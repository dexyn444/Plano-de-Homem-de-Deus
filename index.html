<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homem de Deus • Conectado</title>
    <style>
        :root {
            --bg: #070a13;
            --surface: rgba(17, 24, 39, 0.75);
            --primary: #00f5d4; /* Neon Ciano */
            --primary-glow: rgba(0, 245, 212, 0.25);
            --accent: #2563eb; /* Azul Elétrico */
            --text: #ffffff;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 245, 212, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 245, 212, 0.2);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--primary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            margin-top: 4px;
            margin-bottom: 24px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .badge-date {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            display: inline-block;
            margin-bottom: 28px;
        }

        .content-area {
            background: rgba(10, 14, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
            text-align: left;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        .verse-title {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 8px;
            margin-top: 24px;
        }

        .label:first-of-type { margin-top: 0; }

        .text-main {
            font-size: 15px;
            line-height: 1.6;
            color: #e2e8f0;
            font-style: italic;
        }

        .challenge-box {
            background: rgba(37, 99, 235, 0.1);
            border-left: 3px solid var(--accent);
            padding: 14px;
            border-radius: 0 12px 12px 0;
            font-size: 14px;
            line-height: 1.5;
            color: #f1f5f9;
            font-weight: 500;
        }

        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, #00f5d4 0%, #00b49d 100%);
            color: #050508;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(0, 245, 212, 0.25);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 245, 212, 0.4);
        }

        .loading-text {
            font-size: 11px;
            color: var(--primary);
            margin-top: -15px;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-card">
    <header>
        <h1>Homem de Deus</h1>
        <p>CONEXÃO LOCAL LIBERADA</p>
    </header>

    <div class="badge-date" id="current-date">CARREGANDO...</div>

    <div class="content-area">
        <div class="label"><b>📖 TEXTO BÍBLICO</b></div>
        <div class="verse-title" id="verse-ref">Carregando...</div>
        <div class="text-main" id="verse-text">Buscando Palavra viva online...</div>

        <div class="label"><b>⚡ DESAFIO PRÁTICO MASCULINO</b></div>
        <div class="challenge-box" id="challenge-text">Carregando...</div>
    </div>

    <div class="loading-text" id="status-api">Conectado</div>

    <button class="btn-action" onclick="buscarPalavra()">
        Próxima Mensagem
    </button>
</div>

<script>
    const desafios = [
        "Identifique uma área ou conversa tóxica hoje e afaste-se dela imediatamente.",
        "Enfrente uma tarefa difícil ou conversa chata que você estava adiando hoje mesmo.",
        "Filtre tudo o que você assistir e ouvir hoje. Proteja sua mente de conteúdos ruins.",
        "Não dê nenhuma desculpa ou demonstre preguiça diante das suas obrigações hoje.",
        "Quando sentir raiva ou irritação hoje, respire fundo por 5 segundos e responda com calma.",
        "Substitua 20 minutos de rolar o feed do celular por leitura ou reflexão em silêncio.",
        "Mande uma mensagem de apoio ou encorajamento para um amigo que está na luta diária.",
        "Escute com atenção as pessoas hoje sem interrompê-las para dar sua opinião.",
        "Faça uma boa ação por alguém em segredo hoje, sem contar para ninguém.",
        "Seja 100% honesto em cada palavra dita hoje, mesmo que a verdade seja desconfortável."
    ];

    const backupVersiculos = [
        { ref: "1 Timóteo 6:11", texto: "Mas você, homem de Deus, fuja de tudo isso e busque a justiça, a piedade, a fé, o amor, a constância e a mansidão." },
        { ref: "1 Coríntios 16:13", texto: "Estejam alertas, permaneçam firmes na fé, ajam como homens e sejam fortes." },
        { ref: "Provérbios 4:23", texto: "Acima de tudo o que deve ser guardado, guarde o seu coração, pois dele procedem as fontes da vida." },
        { ref: "Josué 1:9", texto: "Não fui eu que ordenei? Seja forte e corajoso! Não se apavore nem desanime." }
    ];

    // Lista de livros aceitos pela nova API aberta
    const livros = ["proverbs", "psalms", "timothy", "joshua", "corinthians", "james", "ephesians"];

    function atualizarData() {
        const opcoes = { weekday: 'long', day: 'numeric', month: 'short' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', opcoes).toUpperCase();
    }

    async function buscarPalavra() {
        document.getElementById('status-api').innerText = "⚡ Conectando...";
        
        const livroAleatorio = livros[Math.floor(Math.random() * livros.length)];
        const capituloAleatorio = Math.floor(Math.random() * 10) + 1;

        try {
            // Nova API internacional que aceita requisições locais (file://) sem bloquear por segurança
            const resposta = await fetch(`https://bible-api.com/${livroAleatorio}+${capituloAleatorio}:1`);
            const dados = await resposta.json();
            
            document.getElementById('verse-ref').innerText = dados.reference;
            // Tradução dinâmica simples via código ou exibição direta em inglês adaptada para leitura limpa
            document.getElementById('verse-text').innerText = `"${dados.text.trim()}"`;
            document.getElementById('status-api').innerText = "🌐 Conectado Online";
        } catch (error) {
            // Se mesmo assim o navegador for muito rígido na segurança local, o backup assume na hora sem travar a tela
            const reserva = backupVersiculos[Math.floor(Math.random() * backupVersiculos.length)];
            document.getElementById('verse-ref').innerText = reserva.ref;
            document.getElementById('verse-text').innerText = `"${reserva.texto}"`;
            document.getElementById('status-api').innerText = "🔒 Proteção Local Ativa";
        }

        document.getElementById('challenge-text').innerText = desafios[Math.floor(Math.random() * desafios.length)];
    }

    atualizarData();
    buscarPalavra();
</script>

</body>
</html>
