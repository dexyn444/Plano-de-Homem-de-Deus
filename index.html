<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Homem de Deus</title>
    
    <!-- Configurações exclusivas para o iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Homem de Deus">
    
    <!-- ÍCONE EM CÓDIGO PURO (Sem links externos, erro zero) -->
    <link rel="https://www.flaticon.com/br/icone-gratis/simbolos_13519515?term=le%C3%A3o+de+jud%C3%A1&page=1&position=25&origin=tag&related_id=13519515">
    
    <style>
        :root {
            --fundo: #050811;
            --bloco: rgba(16, 22, 42, 0.8);
            --neon-ciano: #00f5d4;
            --neon-glow: rgba(0, 245, 212, 0.3);
            --azul-forte: #1e40af;
            --texto-claro: #ffffff;
            --texto-escuro: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--fundo);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 245, 212, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 64, 175, 0.15) 0px, transparent 50%);
            color: var(--texto-claro);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-top: env(safe-area-inset-top);
        }

        .container-principal {
            width: 100%;
            max-width: 420px;
            background: var(--bloco);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 245, 212, 0.25);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        /* Escudo geométrico estilizado feito em CSS/SVG */
        .app-logo {
            width: 75px;
            height: 75px;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header h1 {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--neon-ciano);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            margin-top: 4px;
            margin-bottom: 24px;
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .data-hoje {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 11px;
            color: var(--texto-escuro);
            font-weight: 700;
            display: inline-block;
            margin-bottom: 28px;
        }

        .caixa-conteudo {
            background: rgba(7, 10, 19, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
            text-align: left;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.9);
        }

        .titulo-versiculo {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .subtitulo-etiqueta {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-ciano);
            font-weight: 800;
            margin-bottom: 8px;
            margin-top: 24px;
        }

        .subtitulo-etiqueta:first-of-type { margin-top: 0; }

        .texto-da-palavra {
            font-size: 15px;
            line-height: 1.6;
            color: #e2e8f0;
            font-style: italic;
        }

        .caixa-desafio {
            background: rgba(30, 64, 175, 0.2);
            border-left: 3px solid var(--azul-forte);
            padding: 14px;
            border-radius: 0 12px 12px 0;
            font-size: 14px;
            line-height: 1.5;
            color: #f1f5f9;
            font-weight: 500;
        }

        .botao-mudar {
            width: 100%;
            background: linear-gradient(135deg, #00f5d4 0%, #00b49d 100%);
            color: #050811;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(0, 245, 212, 0.25);
            -webkit-tap-highlight-color: transparent;
        }

        .botao-mudar:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 245, 212, 0.4);
        }
    </style>
</head>
<body>

<div class="container-principal">
    <!-- Ícone interno em vetor inteligente (Seguro contra erros) -->
    <div class="app-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#00f5d4" stroke-width="2" stroke-dasharray="5 3"/>
            <polygon points="50,15 80,38 70,80 30,80 20,38" fill="rgba(0,245,212,0.1)" stroke="#00f5d4" stroke-width="3"/>
            <path d="M50 30 L62 48 L56 50 L65 68 L50 60 L35 68 L44 50 L38 48 Z" fill="#00f5d4"/>
        </svg>
    </div>

    <header>
        <h1>Homem de Deus</h1>
        <p>100% Em Português</p>
    </header>

    <div class="data-hoje" id="txt-data">CARREGANDO DATA...</div>

    <div class="caixa-conteudo">
        <div class="subtitulo-etiqueta"><b>📖 LEITURA BÍBLICA</b></div>
        <div class="titulo-versiculo" id="txt-referencia">Carregando...</div>
        <div class="texto-da-palavra" id="txt-versiculo">Carregando...</div>

        <div class="subtitulo-etiqueta"><b>⚡ DESAFIO PRÁTICO</b></div>
        <div class="caixa-desafio" id="txt-desafio">Carregando...</div>
    </div>

    <button class="botao-mudar" onclick="sortearNovaMensagem()">
        Mudar Mensagem
    </button>
</div>

<script>
    const listaDeTextos = [
        { livro: "1 Timóteo 6:11", mensagem: "Mas você, homem de Deus, fuja de tudo isso e busque a justiça, a piedade, a fé, o amor, a constância e a mansidão.", tarefa: "Identifique uma área ou conversa tóxica hoje e afaste-se dela imediatamente." },
        { livro: "1 Coríntios 16:13", mensagem: "Estejam alertas, permaneçam firmes na fé, ajam como homens e sejam fortes.", tarefa: "Enfrente uma tarefa difícil ou uma conversa chata que você estava adiando hoje mesmo." },
        { livro: "Provérbios 4:23", mensagem: "Acima de tudo o que deve ser guardado, guarde o seu coração, pois dele procedem as fontes da vida.", tarefa: "Filtre tudo o que você assistir e ouvir hoje. Proteja sua mente de conteúdos ruins." },
        { livro: "Josué 1:9", mensagem: "Não fui eu que ordenei? Seja forte e corajoso! Não se apavore nem desanime, pois o Senhor, o seu Deus, estará com você por onde você andar.", tarefa: "Não dê nenhuma desculpa ou demonstre preguiça diante das suas obrigações hoje." },
        { livro: "Provérbios 16:32", mensagem: "Melhor é o homem paciente do que o guerreiro, mais vale controlar o seu próprio espírito do que conquistar uma cidade inteira.", tarefa: "Quando sentir raiva ou irritação hoje, respire fundo por 5 segundos e responda com calma." },
        { livro: "Salmo 1:1-2", mensagem: "Bem-aventurado o homem que não anda no conselho dos ímpios... Antes, o seu prazer está na lei do Senhor.", tarefa: "Substitua 20 minutos de redes sociais por leitura ou reflexão em silêncio hoje." },
        { livro: "Provérbios 27:17", mensagem: "Como o ferro afia o ferro, assim o homem afia o seu companheiro.", tarefa: "Mande uma mensagem de apoio ou ligue para um amigo que está enfrentando lutas diárias." },
        { livro: "Tiago 1:19", mensagem: "Meus amados irmãos, tenham isto em mente: Sejam todos prontos para ouvir, tardio para falar e tardio para se irar.", tarefa: "Escute com atenção as pessoas hoje sem interrompê-las para dar sua opinião rápida." },
        { livro: "Gálatas 6:7", mensagem: "Não se enganem: de Deus não se zomba. Pois o que o homem semear, isso também colherá.", tarefa: "Faça uma boa ação por alguém em segredo hoje, sem contar para absolutamente ninguém." },
        { livro: "Efésios 5:25", mensagem: "Maridos, amem suas mulheres, assim como Cristo amou a igreja e entregou-se por ela.", tarefa: "Trate as pessoas da sua casa com honra extra, ajudando em alguma tarefa pesada." }
    ];

    function configurarData() {
        const opcoes = { weekday: 'long', day: 'numeric', month: 'short' };
        document.getElementById('txt-data').innerText = new Date().toLocaleDateString('pt-BR', opcoes).toUpperCase();
    }

    function sortearNovaMensagem() {
        const itemSorteado = listaDeTextos[Math.floor(Math.random() * listaDeTextos.length)];
        document.getElementById('txt-referencia').innerText = itemSorteado.livro;
        document.getElementById('txt-versiculo').innerText = `"${itemSorteado.mensagem}"`;
        document.getElementById('txt-desafio').innerText = itemSorteado.tarefa;
    }

    configurarData();
    sortearNovaMensagem();
</script>
</body>
</html>
